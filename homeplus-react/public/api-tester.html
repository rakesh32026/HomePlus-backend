<!DOCTYPE html>
<html>
<head>
    <title>HomePlus API Tester</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #ff9800; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #f57c00; }
        .response { background: #f9f9f9; border: 1px solid #ddd; padding: 10px; margin-top: 15px; border-radius: 4px; }
        .success { color: green; }
        .error { color: red; }
        .info { color: #0066cc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 HomePlus API Tester</h1>
        
        <div class="form-group">
            <label>API Endpoint:</label>
            <select id="endpoint" style="width: 100%; padding: 10px;">
                <option value="http://localhost:8080/api/auth/signup">Signup</option>
                <option value="http://localhost:8080/api/auth/login">Login</option>
                <option value="http://localhost:8080/api/properties">Get Properties</option>
            </select>
        </div>

        <div class="form-group">
            <label>Request Body (JSON):</label>
            <textarea id="body" rows="6">{
  "fullName": "John Doe",
  "email": "john@example.com",
  "phone": "1234567890",
  "password": "Password123",
  "role": "HOMEOWNER"
}</textarea>
        </div>

        <div class="form-group">
            <label>JWT Token (for protected requests):</label>
            <input type="text" id="token" placeholder="Leave empty for signup/login">
        </div>

        <button onclick="sendRequest()">Send Request</button>

        <div id="response" class="response" style="display:none;">
            <strong>Response:</strong>
            <pre id="responseText"></pre>
        </div>
    </div>

    <script>
        async function sendRequest() {
            const endpoint = document.getElementById('endpoint').value;
            const body = document.getElementById('body').value;
            const token = document.getElementById('token').value;

            try {
                const headers = {
                    'Content-Type': 'application/json'
                };
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: headers,
                    body: body
                });

                const data = await response.json();
                
                const responseDiv = document.getElementById('response');
                const responseText = document.getElementById('responseText');
                
                responseText.innerHTML = JSON.stringify(data, null, 2);
                
                if (response.ok) {
                    responseText.className = 'success';
                    if (data.token) {
                        responseText.innerHTML += '<br><br><strong>✅ Token received! Copy it above to test protected endpoints.</strong>';
                        document.getElementById('token').value = data.token;
                    }
                } else {
                    responseText.className = 'error';
                }
                
                responseDiv.style.display = 'block';
            } catch (error) {
                const responseDiv = document.getElementById('response');
                const responseText = document.getElementById('responseText');
                responseText.HTML = `<span class="error">Error: ${error.message}</span>`;
                responseDiv.style.display = 'block';
            }
        }

        // Test templates
        function setSignupTemplate() {
            document.getElementById('body').value = JSON.stringify({
                fullName: "John Doe",
                email: "john@example.com",
                phone: "1234567890",
                password: "Password123",
                role: "HOMEOWNER"
            }, null, 2);
        }

        function setLoginTemplate() {
            document.getElementById('body').value = JSON.stringify({
                email: "john@example.com",
                password: "Password123"
            }, null, 2);
        }
    </script>
</body>
</html>
